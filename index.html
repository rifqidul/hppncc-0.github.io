<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator HPP & Resep Card</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
    nav ul { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tab-link { text-decoration: none; padding: 0.5rem 1rem; border-radius: 4px; background: #eee; color: #333; }
    .tab-active { background: var(--primary, #007bff); color: white; }
    .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .card { padding: 1rem; background: var(--card-background-color, #fff); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .badge { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 12px; background: #ddd; color: #333; display: inline-block; margin-bottom: 0.5rem; }
    .margin-positif { color: green; font-weight: bold; }
    .margin-negatif { color: red; font-weight: bold; }
    .sort-btn { cursor: pointer; user-select: none; }
    .login-area { display: flex; align-items: center; gap: 0.5rem; }
    .hidden { display: none !important; }
    .resep-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; }
    .resep-row select, .resep-row input { flex: 1; }
    button { margin: 0.25rem 0; }
  </style>
</head>
<body>
  <main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem;">
      <h1 style="margin:0;">🍵 Kalkulator HPP & Resep</h1>
      <div class="login-area">
        <span id="userEmail" class="hidden" style="margin-right: 0.5rem;"></span>
        <button id="loginBtn">🔐 Login</button>
        <button id="logoutBtn" class="hidden">🚪 Logout</button>
      </div>
    </div>

    <nav>
      <ul style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
        <li><a href="#" data-tab="bahan" class="tab-link tab-active">🧂 Bahan Baku</a></li>
        <li><a href="#" data-tab="menu" class="tab-link">📋 Menu/Resep</a></li>
        <li><a href="#" data-tab="hpp" class="tab-link">📊 Daftar HPP</a></li>
        <li><a href="#" data-tab="directory" class="tab-link">🃏 Directory Resep</a></li>
      </ul>
    </nav>

    <div id="tab-content"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ======================== KONFIGURASI ========================
    const SUPABASE_URL = 'https://mslsgobvzzxxkwfvpjhx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zbHNnb2J2enp4eGt3ZnZwamh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzAzMDEsImV4cCI6MjA5NzgwNjMwMX0.V7pUmC3En3O0pc3VamJUm9eq7cnB7UFLi333LmtnJqQ';
    
    // Inisialisasi Supabase - Diganti menjadi supabaseClient untuk mencegah konflik variabel global
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // =============================================================

    // State global
    let currentUser = null;

    // Cek session awal & listener perubahan auth
    supabaseClient.auth.onAuthStateChange((event, session) => {
      currentUser = session?.user ?? null;
      updateAuthUI();
      // Hanya muat ulang tab jika user sengaja login/logout, cegah double-render di awal
      if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
        const activeTab = document.querySelector('.tab-active');
        if (activeTab) loadTab(activeTab.dataset.tab);
      }
    });

    function updateAuthUI() {
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const userEmail = document.getElementById('userEmail');
      if (currentUser) {
        loginBtn.classList.add('hidden');
        logoutBtn.classList.remove('hidden');
        userEmail.classList.remove('hidden');
        userEmail.textContent = '👤 ' + currentUser.email;
      } else {
        loginBtn.classList.remove('hidden');
        logoutBtn.classList.add('hidden');
        userEmail.classList.add('hidden');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = prompt('Email terdaftar di Supabase Auth:');
        if (!email) return;
        const password = prompt('Password:');
        if (!password) return;
        
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert('Login gagal: ' + error.message);
      });

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
      });

      document.querySelectorAll('.tab-link').forEach(link => {
        link.addEventListener('click', async (e) => {
          e.preventDefault();
          document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('tab-active'));
          link.classList.add('tab-active');
          await loadTab(link.dataset.tab);
        });
      });

      // Muat tab awal
      loadTab('bahan');
    });

    async function loadTab(tab) {
      const content = document.getElementById('tab-content');
      if (!content) return;
      content.innerHTML = '<p>Memuat data...</p>'; // Indikator loading ringan
      switch(tab) {
        case 'bahan': content.innerHTML = await renderBahanBaku(); break;
        case 'menu': content.innerHTML = await renderMenu(); break;
        case 'hpp': content.innerHTML = await renderHPP(); break;
        case 'directory': content.innerHTML = await renderDirectory(); break;
        default: content.innerHTML = '<p>Tab tidak ditemukan.</p>';
      }
    }

    // ===================== BAHAN BAKU =====================
    async function fetchBahanBaku() {
      const { data, error } = await supabaseClient.from('bahan_baku').select('*').order('nama');
      if (error) { alert('Gagal mengambil bahan baku: ' + error.message); return []; }
      return data;
    }

    async function renderBahanBaku() {
      const items = await fetchBahanBaku();
      let html = `<h2>Daftar Bahan Baku</h2>`;
      if (currentUser) html += `<button id="tambahBahan" class="primary">+ Tambah Bahan</button>`;
      html += `<table><thead><tr><th>Nama</th><th>Satuan</th><th>Harga/Satuan</th>`;
      if (currentUser) html += `<th>Aksi</th>`;
      html += `</tr></thead><tbody>`;
      items.forEach(i => {
        html += `<tr>
          <td>${i.nama}</td><td>${i.satuan}</td><td>Rp ${i.harga_per_satuan}</td>`;
        if (currentUser) html += `<td><button class="hapus-bahan" data-id="${i.id}">🗑️</button></td>`;
        html += `</tr>`;
      });
      html += `</tbody></table>`;
      
      setTimeout(() => {
        if (currentUser) {
          const btnTambah = document.getElementById('tambahBahan');
          if (btnTambah) btnTambah.addEventListener('click', tambahBahanForm);
          document.querySelectorAll('.hapus-bahan').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (confirm('Hapus bahan baku ini?')) {
                await supabaseClient.from('bahan_baku').delete().eq('id', btn.dataset.id);
                await loadTab('bahan');
              }
            });
          });
        }
      }, 100);
      return html;
    }

    function tambahBahanForm() {
      const html = `<article>
        <h3>Tambah Bahan Baku</h3>
        <input id="namaBahan" placeholder="Nama bahan"><br>
        <input id="satuanBahan" placeholder="Satuan (gr/ml/pcs)"><br>
        <input id="hargaBahan" type="number" placeholder="Harga per satuan"><br>
        <button id="simpanBahan">Simpan</button>
        <button id="batalBahan" class="secondary">Batal</button>
      </article>`;
      const div = document.createElement('div');
      div.innerHTML = html;
      document.getElementById('tab-content').prepend(div);
      
      document.getElementById('simpanBahan').addEventListener('click', async () => {
        const nama = document.getElementById('namaBahan').value.trim();
        const satuan = document.getElementById('satuanBahan').value.trim();
        const harga = parseFloat(document.getElementById('hargaBahan').value);
        if (!nama || !satuan || isNaN(harga)) return alert('Lengkapi semua data');
        const { error } = await supabaseClient.from('bahan_baku').insert({ nama, satuan, harga_per_satuan: harga });
        if (error) alert(error.message);
        else { div.remove(); await loadTab('bahan'); }
      });
      document.getElementById('batalBahan').addEventListener('click', () => div.remove());
    }

    // ===================== MENU / RESEP =====================
    async function fetchMenu() {
      const { data, error } = await supabaseClient.from('menu').select('*').order('nama');
      if (error) { alert(error.message); return []; }
      return data;
    }

    async function renderMenu() {
      const menus = await fetchMenu();
      let html = `<h2>Daftar Menu</h2>`;
      if (currentUser) html += `<button id="tambahMenu">+ Menu Baru</button>`;
      html += `<table><thead><tr><th>Nama</th><th>Kategori</th><th>Sub</th><th>Harga Jual</th>`;
      if (currentUser) html += `<th>Aksi</th>`;
      html += `</tr></thead><tbody>`;
      menus.forEach(m => {
        html += `<tr>
          <td>${m.nama}</td><td>${m.kategori}</td><td>${m.sub_kategori || '-'}</td>
          <td>Rp ${m.harga_jual}</td>`;
        if (currentUser) html += `<td><button class="edit-menu" data-id="${m.id}">✏️</button> <button class="hapus-menu" data-id="${m.id}">🗑️</button></td>`;
        html += `</tr>`;
      });
      html += `</tbody></table>`;
      
      setTimeout(() => {
        if (currentUser) {
          const btnTambah = document.getElementById('tambahMenu');
          if (btnTambah) btnTambah.addEventListener('click', () => formMenu());
          document.querySelectorAll('.edit-menu').forEach(btn => {
            btn.addEventListener('click', async () => {
              const { data } = await supabaseClient.from('menu').select('*').eq('id', btn.dataset.id).single();
              formMenu(data);
            });
          });
          document.querySelectorAll('.hapus-menu').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (confirm('Hapus menu?')) {
                await supabaseClient.from('menu').delete().eq('id', btn.dataset.id);
                await loadTab('menu');
              }
            });
          });
        }
      }, 100);
      return html;
    }

    async function formMenu(menuData = null) {
      const menu = menuData || {};
      const { data: bahanList } = await supabaseClient.from('bahan_baku').select('*');
      const existingResep = menu.id ? (await supabaseClient.from('resep_bahan').select('*, bahan_baku(*)').eq('menu_id', menu.id)).data : [];
      let html = `<article><h3>${menu.id ? 'Edit' : 'Tambah'} Menu</h3>
        <input id="namaMenu" placeholder="Nama Menu" value="${menu.nama || ''}"><br>
        <input id="kategoriMenu" placeholder="Kategori (contoh: Beverage)" value="${menu.kategori || ''}"><br>
        <input id="subMenu" placeholder="Sub Kategori (contoh: Matcha)" value="${menu.sub_kategori || ''}"><br>
        <input id="hargaJual" type="number" placeholder="Harga Jual" value="${menu.harga_jual || ''}"><br>
        <h4>Resep Bahan</h4>
        <div id="resepContainer">`;
      existingResep.forEach(r => html += resepRow(r.bahan_baku_id, r.jumlah, bahanList));
      html += `</div>
        <button id="tambahResepRow" class="secondary">+ Tambah Bahan</button><br><br>
        <button id="simpanMenu">💾 Simpan Menu</button>
        <button id="batalMenu" class="secondary">Batal</button></article>`;
      
      const div = document.createElement('div');
      div.innerHTML = html;
      document.getElementById('tab-content').prepend(div);
      
      document.getElementById('tambahResepRow').addEventListener('click', () => {
        document.getElementById('resepContainer').insertAdjacentHTML('beforeend', resepRow(null, 0, bahanList));
      });
      
      document.getElementById('simpanMenu').addEventListener('click', async () => {
        const nama = document.getElementById('namaMenu').value.trim();
        const kategori = document.getElementById('kategoriMenu').value.trim();
        const sub = document.getElementById('subMenu').value.trim();
        const harga = parseFloat(document.getElementById('hargaJual').value);
        if (!nama || !kategori || isNaN(harga)) return alert('Nama, Kategori, dan Harga Jual wajib diisi');
        
        let menuId = menu.id;
        if (!menuId) {
          const { data, error } = await supabaseClient.from('menu').insert({ nama, kategori, sub_kategori: sub, harga_jual: harga }).select();
          if (error) return alert(error.message);
          menuId = data[0].id;
        } else {
          const { error } = await supabaseClient.from('menu').update({ nama, kategori, sub_kategori: sub, harga_jual: harga }).eq('id', menuId);
          if (error) return alert(error.message);
          await supabaseClient.from('resep_bahan').delete().eq('menu_id', menuId);
        }
        
        const rows = document.querySelectorAll('.resep-row');
        for (let row of rows) {
          const select = row.querySelector('.bahan-select');
          const input = row.querySelector('.jumlah-input');
          if (!select || !input) continue;
          const bahanId = select.value;
          const jumlah = parseFloat(input.value);
          if (bahanId && jumlah > 0) {
            await supabaseClient.from('resep_bahan').insert({ menu_id: menuId, bahan_baku_id: bahanId, jumlah });
          }
        }
        div.remove();
        await loadTab('menu');
      });
      document.getElementById('batalMenu').addEventListener('click', () => div.remove());
    }

    function resepRow(selectedBahanId = null, jumlah = 0, bahanList) {
      let options = bahanList.map(b => `<option value="${b.id}" ${b.id === selectedBahanId ? 'selected' : ''}>${b.nama} (${b.satuan})</option>`).join('');
      return `<div class="resep-row">
        <select class="bahan-select">${options}</select>
        <input type="number" class="jumlah-input" placeholder="Jumlah" value="${jumlah}" step="0.01">
      </div>`;
    }

    // ===================== DAFTAR HPP =====================
    async function fetchHPP() {
      const { data: menus } = await supabaseClient.from('menu').select('*, resep_bahan(jumlah, bahan_baku(harga_per_satuan, nama, satuan))');
      if (!menus) return [];
      return menus.map(m => {
        const hpp = m.resep_bahan.reduce((sum, rb) => sum + (rb.jumlah * (rb.bahan_baku?.harga_per_satuan || 0)), 0);
        const margin = m.harga_jual - hpp;
        const persen = m.harga_jual !== 0 ? (hpp / m.harga_jual) * 100 : 0;
        return { ...m, hpp, margin, persen_hpp: persen };
      });
    }

    async function renderHPP() {
      const data = await fetchHPP();
      window.hppData = data;
      let html = `<h2>Daftar HPP & Margin</h2>
        <table id="hppTable"><thead><tr>
          <th class="sort-btn" data-sort="nama">Nama 🔽</th>
          <th class="sort-btn" data-sort="kategori">Kategori</th>
          <th class="sort-btn" data-sort="hpp">HPP</th>
          <th class="sort-btn" data-sort="harga_jual">Harga Jual</th>
          <th class="sort-btn" data-sort="margin">Margin</th>
          <th class="sort-btn" data-sort="persen_hpp">% HPP</th>
        </tr></thead><tbody>`;
      data.forEach(d => {
        const marginClass = d.margin >= 0 ? 'margin-positif' : 'margin-negatif';
        html += `<tr><td>${d.nama}</td><td>${d.kategori} - ${d.sub_kategori || ''}</td><td>Rp ${d.hpp.toFixed(0)}</td><td>Rp ${d.harga_jual}</td><td class="${marginClass}">Rp ${d.margin.toFixed(0)}</td><td>${d.persen_hpp.toFixed(1)}%</td></tr>`;
      });
      html += `</tbody></table>`;
      
      setTimeout(() => {
        document.querySelectorAll('.sort-btn').forEach(btn => btn.addEventListener('click', () => sortTable(btn.dataset.sort)));
      }, 100);
      return html;
    }

    function sortTable(field) {
      const data = window.hppData;
      if (!data) return;
      const sorted = [...data].sort((a, b) => {
        const valA = typeof a[field] === 'string' ? a[field].toLowerCase() : a[field];
        const valB = typeof b[field] === 'string' ? b[field].toLowerCase() : b[field];
        return valA > valB ? 1 : -1;
      });
      window.hppData = sorted;
      const tbody = document.querySelector('#hppTable tbody');
      if (!tbody) return;
      tbody.innerHTML = sorted.map(d => {
        const marginClass = d.margin >= 0 ? 'margin-positif' : 'margin-negatif';
        return `<tr><td>${d.nama}</td><td>${d.kategori} - ${d.sub_kategori || ''}</td><td>Rp ${d.hpp.toFixed(0)}</td><td>Rp ${d.harga_jual}</td><td class="${marginClass}">Rp ${d.margin.toFixed(0)}</td><td>${d.persen_hpp.toFixed(1)}%</td></tr>`;
      }).join('');
    }

    // ===================== DIRECTORY RESEP CARD =====================
    async function renderDirectory() {
      const data = await fetchHPP();
      const categories = [...new Set(data.map(d => d.kategori))];
      let html = `<h2>Directory Resep Card</h2>
        <div class="grid">
          <input id="searchDir" placeholder="Cari nama resep...">
          <select id="filterKategori"><option value="">Semua Kategori</option>
            ${categories.map(c => `<option>${c}</option>`).join('')}
          </select>
          <select id="filterSub"><option value="">Semua Sub</option></select>
        </div>
        <div id="cardContainer" class="grid-cards"></div>`;

      setTimeout(() => {
        const filterKategori = document.getElementById('filterKategori');
        const filterSub = document.getElementById('filterSub');
        const search = document.getElementById('searchDir');
        if (!filterKategori || !filterSub || !search) return;

        const updateSub = () => {
          const selectedCat = filterKategori.value;
          const subs = data.filter(d => !selectedCat || d.kategori === selectedCat).map(d => d.sub_kategori).filter(Boolean);
          const uniqueSubs = [...new Set(subs)];
          filterSub.innerHTML = '<option value="">Semua Sub</option>' + uniqueSubs.map(s => `<option>${s}</option>`).join('');
        };
        filterKategori.addEventListener('change', updateSub);
        updateSub();

        const filterAndRender = () => {
          const keyword = search.value.toLowerCase();
          const cat = filterKategori.value;
          const sub = filterSub.value;
          const filtered = data.filter(d => {
            if (keyword && !d.nama.toLowerCase().includes(keyword)) return false;
            if (cat && d.kategori !== cat) return false;
            if (sub && d.sub_kategori !== sub) return false;
            return true;
          });
          const container = document.getElementById('cardContainer');
          if (!container) return;
          container.innerHTML = filtered.map(d => {
            const marginClass = d.margin >= 0 ? 'margin-positif' : 'margin-negatif';
            const bahanList = d.resep_bahan.map(rb => {
              const nama = rb.bahan_baku?.nama || '?';
              const harga = rb.bahan_baku?.harga_per_satuan || 0;
              return `<li>${rb.jumlah} ${rb.bahan_baku?.satuan || ''} ${nama} (Rp ${harga})</li>`;
            }).join('');
            return `<div class="card">
              <h3>${d.nama}</h3>
              <span class="badge">${d.kategori} / ${d.sub_kategori || 'Umum'}</span>
              <p>💵 Harga Jual: <strong>Rp ${d.harga_jual}</strong></p>
              <p>🧮 HPP: Rp ${d.hpp.toFixed(0)} | Margin: <span class="${marginClass}">Rp ${d.margin.toFixed(0)}</span> (${d.persen_hpp.toFixed(1)}%)</p>
              <details><summary>📦 Bahan Baku</summary><ul>${bahanList}</ul></details>
            </div>`;
          }).join('');
        };

        search.addEventListener('input', filterAndRender);
        filterKategori.addEventListener('change', filterAndRender);
        filterSub.addEventListener('change', filterAndRender);
        filterAndRender();
      }, 100);
      return html;
    }
  </script>
</body>
</html>
